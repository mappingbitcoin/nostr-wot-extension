name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run crypto tests
        run: node --import tsx --test tests/crypto/*.test.ts

      - name: Run module tests
        run: node --import tsx --import ./tests/helpers/register-mocks.ts --test tests/vault.test.ts tests/permissions.test.ts tests/accounts.test.ts tests/signer.test.ts tests/security-hardening.test.ts tests/communication.test.ts
        timeout-minutes: 5

      - name: Run relay tests
        run: node --import tsx --import ./tests/helpers/register-mocks.ts --test tests/relay.test.ts
        timeout-minutes: 2

      - name: Build
        run: npm run build
